<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VCMS Pro — Dashboard</title>
<link rel="stylesheet" href="css/styles.css">
</head>
<body>
<canvas id="galaxy-canvas"></canvas>
<div class="cursor-dot"></div><div class="cursor-ring"></div>
<div id="toast-container"></div>

<!-- LOADING -->
<div class="loading-overlay" id="loading-overlay">
  <div class="loading-box">
    <div class="loading-logo">💼</div>
    <div class="loading-text">VCMS Pro</div>
    <div class="loading-sub">Loading your workspace…</div>
    <div class="spinner" style="margin-top:8px;width:22px;height:22px"></div>
  </div>
</div>

<div class="app-layout">
  <!-- SIDEBAR -->
  <nav class="sidebar" id="sidebar">
    <div class="sb-logo">
      <div class="sb-mark">💼</div>
      <div>
        <div class="sb-name">VCMS<span>Pro</span></div>
        <div class="sb-badge" id="role-badge">Loading…</div>
      </div>
    </div>
    <div class="sb-nav" id="sidebar-nav"></div>
    <div class="sb-footer">
      <div class="sb-user" onclick="navigateTo('settings')" style="cursor:none">
        <div class="sb-avatar user-avatar-initials">?</div>
        <div style="flex:1;min-width:0">
          <div class="sb-uname user-name-display">Loading…</div>
          <div class="sb-urole user-role-display">—</div>
        </div>
        <span style="color:var(--txt3);font-size:13px">⚙️</span>
      </div>
    </div>
  </nav>

  <!-- TOPBAR -->
  <header class="topbar">
    <button class="tb-btn" id="menu-btn" style="display:none" onclick="document.getElementById('sidebar').classList.toggle('open')">☰</button>
    <div class="tb-title" id="topbar-title">Dashboard</div>
    <div class="search-box">
      <span style="color:var(--txt3);font-size:14px">🔍</span>
      <input type="text" placeholder="Search vendors, contracts…" id="global-search-input" oninput="globalSearch(this.value)">
    </div>

    <button class="tb-btn theme-toggle-btn" onclick="Theme.toggle()" title="Toggle theme">☀️</button>
    <div style="position:relative">
      <button class="tb-btn" id="notif-btn" title="Notifications">🔔
        <span class="notif-dot" id="ndot" style="display:none"></span>
      </button>
      <span id="notif-count-badge" style="display:none;position:absolute;top:-4px;right:-4px;background:var(--err);color:#fff;font-size:10px;font-weight:700;padding:1px 5px;border-radius:10px;min-width:16px;text-align:center"></span>
    </div>
    <div class="sb-user" style="padding:5px 10px;border-radius:var(--rd);border:1px solid var(--bdr);background:var(--surf);gap:7px;width:auto" onclick="navigateTo('settings')">
      <div class="sb-avatar user-avatar-initials" style="width:28px;height:28px;font-size:11px">?</div>
      <span class="user-name-display" style="font-size:13px;max-width:90px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:600">…</span>
    </div>
  </header>

  <!-- MAIN -->
  <main class="main-content">
    <div class="page active" id="page-dashboard"></div>
    <div class="page" id="page-vendors"></div>
    <div class="page" id="page-contracts"></div>
    <div class="page" id="page-invoices"></div>
    <div class="page" id="page-workflows"></div>
    <div class="page" id="page-documents"></div>
    <div class="page" id="page-invoice-gen"></div>
    <div class="page" id="page-ai"></div>
    <div class="page" id="page-analytics"></div>
    <div class="page" id="page-compliance"></div>
    <div class="page" id="page-audit"></div>
    <div class="page" id="page-notifications"></div>
    <div class="page" id="page-settings"></div>
  </main>
</div>

<!-- ═══════════════════════════════════════
     MODAL: ADD / EDIT VENDOR
════════════════════════════════════════ -->
<div class="modal-overlay" id="modal-add-vendor">
  <div class="modal modal-lg">
    <div class="modal-hdr">
      <div class="modal-title">🏢 <span id="modal-vendor-title">Add Vendor</span></div>
      <button class="modal-close" onclick="closeModal('modal-add-vendor');resetVendorForm()">✕</button>
    </div>
    <form id="form-vendor" onsubmit="submitVendor(event)" novalidate>
      <div class="modal-body">
        <div class="form-row">
          <div class="form-group">
            <label>Company Name <span class="req">*</span></label>
            <input type="text" name="name" placeholder="e.g. Infosys Limited" required>
          </div>
          <div class="form-group">
            <label>Category <span class="req">*</span></label>
            <select name="category" required>
              <option value="">Select category…</option>
              <option>Technology</option><option>Legal</option><option>Finance</option>
              <option>Logistics</option><option>Marketing</option><option>HR</option>
              <option>Operations</option><option>Healthcare</option><option>Real Estate</option><option>Education</option>
            </select>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Contact Person</label>
            <input type="text" name="contact_name" placeholder="Primary contact name">
          </div>
          <div class="form-group">
            <label>Email</label>
            <input type="email" name="email" placeholder="vendor@company.com">
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Phone</label>
            <input type="tel" name="phone" placeholder="+91 98765 43210">
          </div>
          <div class="form-group">
            <label>GST / Tax ID</label>
            <input type="text" name="tax_id" placeholder="e.g. 29AABCT1332L1ZD">
          </div>
        </div>
        <div class="form-group">
          <label>Address</label>
          <textarea name="address" rows="2" placeholder="Registered business address"></textarea>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Risk Level (1 = Low, 6 = High)</label>
            <input type="number" name="risk_level" value="2" min="1" max="6">
          </div>
          <div class="form-group">
            <label>Payment Terms</label>
            <select name="payment_terms">
              <option>Net 30</option><option>Net 45</option><option>Net 60</option><option>Net 90</option><option>Immediate</option>
            </select>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Status</label>
            <select name="status">
              <option value="Verified">Verified</option>
              <option value="Pending" selected>Pending</option>
              <option value="Suspended">Suspended</option>
              <option value="Blacklisted">Blacklisted</option>
            </select>
          </div>
          <div class="form-group">
            <label>Notes</label>
            <input type="text" name="notes" placeholder="Optional notes about this vendor">
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" onclick="closeModal('modal-add-vendor');resetVendorForm()">Cancel</button>
        <button type="submit" class="btn btn-primary">💾 Save Vendor</button>
      </div>
    </form>
  </div>
</div>

<!-- ═══════════════════════════════════════
     MODAL: ADD CONTRACT
════════════════════════════════════════ -->
<div class="modal-overlay" id="modal-add-contract">
  <div class="modal modal-lg">
    <div class="modal-hdr">
      <div class="modal-title">📄 New Contract</div>
      <button class="modal-close" onclick="closeModal('modal-add-contract')">✕</button>
    </div>
    <form id="form-contract" onsubmit="submitContract(event)" novalidate>
      <div class="modal-body">
        <div class="form-group">
          <label>Contract Name <span class="req">*</span></label>
          <input type="text" name="name" placeholder="e.g. TCS SaaS License Agreement FY2025" required>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Vendor <span class="req">*</span></label>
            <input type="text" name="vendor_name" placeholder="Start typing vendor name…" list="contract-vendor-list" required>
            <datalist id="contract-vendor-list"></datalist>
          </div>
          <div class="form-group">
            <label>Contract Type</label>
            <select name="contract_type">
              <option>SaaS</option><option>Service</option><option>License</option>
              <option>Supply</option><option>NDA</option><option>Consulting</option><option>Other</option>
            </select>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Contract Value</label>
            <input type="number" name="value" placeholder="0.00" min="0" step="0.01">
          </div>
          <div class="form-group">
            <label>Currency</label>
            <select name="currency" id="contract-currency-sel"></select>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Start Date</label>
            <input type="date" name="start_date">
          </div>
          <div class="form-group">
            <label>Expiry Date</label>
            <input type="date" name="expiry_date">
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Status</label>
            <select name="status">
              <option value="draft">Draft</option>
              <option value="active" selected>Active</option>
              <option value="review">Under Review</option>
              <option value="expired">Expired</option>
            </select>
          </div>
          <div class="form-group">
            <label>Risk Level</label>
            <select name="risk">
              <option value="low">Low</option>
              <option value="medium" selected>Medium</option>
              <option value="high">High</option>
              <option value="critical">Critical</option>
            </select>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Payment Terms</label>
            <select name="payment_terms">
              <option>Net 30</option><option>Net 45</option><option>Net 60</option><option>Net 90</option>
            </select>
          </div>
          <div class="form-group">
            <label>Auto-Renew</label>
            <select name="auto_renew">
              <option value="false">No</option>
              <option value="true">Yes</option>
            </select>
          </div>
        </div>
        <div class="form-group">
          <label>Description / Key Terms</label>
          <textarea name="description" rows="2" placeholder="Contract scope and key terms…"></textarea>
        </div>
        <div class="form-group">
          <label>Tags (comma-separated)</label>
          <input type="text" name="tags" placeholder="e.g. critical, annual, SaaS">
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" onclick="closeModal('modal-add-contract')">Cancel</button>
        <button type="submit" class="btn btn-primary">💾 Create Contract</button>
      </div>
    </form>
  </div>
</div>

<!-- ═══════════════════════════════════════
     MODAL: ADD INVOICE
════════════════════════════════════════ -->
<div class="modal-overlay" id="modal-add-invoice">
  <div class="modal">
    <div class="modal-hdr">
      <div class="modal-title">💰 New Invoice</div>
      <button class="modal-close" onclick="closeModal('modal-add-invoice')">✕</button>
    </div>
    <form id="form-invoice" onsubmit="submitInvoice(event)" novalidate>
      <div class="modal-body">
        <div class="form-group">
          <label>Vendor Name <span class="req">*</span></label>
          <input type="text" name="vendor_name" placeholder="Start typing vendor name…" list="inv-vendor-list" required>
          <datalist id="inv-vendor-list"></datalist>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Amount (before tax) <span class="req">*</span></label>
            <input type="number" name="amount" placeholder="0.00" min="0" step="0.01" required>
          </div>
          <div class="form-group">
            <label>Currency</label>
            <select name="currency" id="inv-currency-sel"></select>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Tax Rate (%)</label>
            <input type="number" name="tax_rate" value="18" min="0" max="100">
          </div>
          <div class="form-group">
            <label>Due Date</label>
            <input type="date" name="due_date">
          </div>
        </div>
        <div class="form-group">
          <label>Status</label>
          <select name="status">
            <option value="pending" selected>Pending</option>
            <option value="paid">Paid</option>
            <option value="overdue">Overdue</option>
            <option value="disputed">Disputed</option>
          </select>
        </div>
        <div class="form-group">
          <label>Notes / Reference</label>
          <textarea name="notes" rows="2" placeholder="Payment reference, PO number, or instructions…"></textarea>
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" onclick="closeModal('modal-add-invoice')">Cancel</button>
        <button type="submit" class="btn btn-primary">💾 Create Invoice</button>
      </div>
    </form>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="js/i18n.js"></script>
<script src="js/utils.js"></script>
<script src="js/galaxy.js"></script>
<script src="js/charts.js"></script>
<script src="js/app.js"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
  // Populate currency dropdowns
  const co = currencyOptions('INR');
  const cSel = document.getElementById('contract-currency-sel');
  const iSel = document.getElementById('inv-currency-sel');
  if (cSel) cSel.innerHTML = co;
  if (iSel) iSel.innerHTML = co;
  // Responsive menu
  if (window.innerWidth <= 900) {
    const mb = document.getElementById('menu-btn');
    if (mb) mb.style.display = 'grid';
  }
});
</script>
</body>
</html>
